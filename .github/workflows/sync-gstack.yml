name: Sync gstack skills

on:
  schedule:
    # Run daily at 08:00 UTC (midnight PST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gstack-course
        uses: actions/checkout@v4

      - name: Checkout garrytan/gstack
        uses: actions/checkout@v4
        with:
          repository: garrytan/gstack
          path: _gstack_upstream
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get upstream SHA
        id: upstream
        run: |
          cd _gstack_upstream
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          CURRENT_SHA=""
          if [ -f references/upstream-sha.txt ]; then
            CURRENT_SHA=$(cat references/upstream-sha.txt)
          fi
          if [ "$CURRENT_SHA" = "${{ steps.upstream.outputs.sha }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes detected in garrytan/gstack"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changes detected: ${CURRENT_SHA:-none} → ${{ steps.upstream.outputs.sha }}"
          fi

      - name: Generate catalog
        if: steps.check.outputs.skip == 'false'
        run: |
          python scripts/generate-catalog.py _gstack_upstream references

      - name: Record upstream SHA
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > references/upstream-sha.txt

      - name: Bump version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          NEW_VERSION=$(python scripts/bump-version.py .)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "gstack-course-bot"
          git config user.email "bot@gstack-course"
          git add references/ version.json SKILL.md
          git commit -m "sync: update from garrytan/gstack@${{ steps.upstream.outputs.sha_short }} (v${{ steps.version.outputs.version }})"
          git push

      - name: Cleanup
        if: always()
        run: rm -rf _gstack_upstream
